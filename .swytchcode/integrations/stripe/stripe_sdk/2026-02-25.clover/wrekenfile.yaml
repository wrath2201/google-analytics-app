      TYPE: STRING
      REQUIRED: true
      comment: "[Status](https://docs.stripe.com/payments/intents#intent-statuses) of this SetupIntent, one of `requires_payment_method`, `requires_confirmation`, `requires_action`, `processing`, `canceled`, or `succeeded`."
    - name: usage
      NAME: usage
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        Indicates how the payment method is intended to be used in the future.

        Use `on_session` if you intend to only reuse the payment method when the customer is in your checkout flow. Use `off_session` if your customer may or may not be in your checkout flow. If not provided, this value defaults to `off_session`.
  payment_method_card_present:
    - name: brand
      NAME: brand
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Card brand. Can be `amex`, `cartes_bancaires`, `diners`, `discover`, `eftpos_au`, `jcb`, `link`, `mastercard`, `unionpay`, `visa` or `unknown`.
