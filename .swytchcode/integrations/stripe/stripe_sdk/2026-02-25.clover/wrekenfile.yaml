  identity.verification_session.cancel.create:
    SUMMARY: Cancel a VerificationSession
    DESC: |-
      <p>A VerificationSession object can be canceled when it is in <code>requires_input</code> <a href="/docs/identity/how-sessions-work">status</a>.</p>

      <p>Once canceled, future submission attempts are disabled. This cannot be undone. <a href="/docs/identity/verification-sessions#cancel">Learn more</a>.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/identity/verification_sessions/{session}/cancel
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(identity.verification_session)
    INPUTS:
      - session:
          TYPE: STRING
          LOCATION: path
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(identity.verification_session)
        RETURNVAR: identity_verification_session_cancel_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: identity_verification_session_cancel_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: identity.verification_session.cancel.create
  identity.verification_session.redact.create:
    SUMMARY: Redact a VerificationSession
    DESC: |-
      <p>Redact a VerificationSession to remove all collected information from Stripe. This will redact
      the VerificationSession and all objects related to it, including VerificationReports, Events,
      request logs, etc.</p>

      <p>A VerificationSession object can be redacted when it is in <code>requires_input</code> or <code>verified</code>
      <a href="/docs/identity/how-sessions-work">status</a>. Redacting a VerificationSession in <code>requires_action</code>
      state will automatically cancel it.</p>

      <p>The redaction process may take up to four days. When the redaction process is in progress, the
      VerificationSession’s <code>redaction.status</code> field will be set to <code>processing</code>; when the process is
      finished, it will change to <code>redacted</code> and an <code>identity.verification_session.redacted</code> event
      will be emitted.</p>

      <p>Redaction is irreversible. Redacted objects are still accessible in the Stripe API, but all the
      fields that contain personal data will be replaced by the string <code>[redacted]</code> or a similar
      placeholder. The <code>metadata</code> field will also be erased. Redacted objects cannot be updated or
      used for any purpose.</p>

      <p><a href="/docs/identity/verification-sessions#redact">Learn more</a>.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/identity/verification_sessions/{session}/redact
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(identity.verification_session)
    INPUTS:
      - session:
          TYPE: STRING
          LOCATION: path
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(identity.verification_session)
        RETURNVAR: identity_verification_session_redact_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: identity_verification_session_redact_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: identity.verification_session.redact.create
