      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(deleted_external_account)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: path
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(deleted_external_account)
        RETURNVAR: accounts_external_account_delete
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_external_account_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.external_account.delete
  accounts.external_account.get_8381:
    SUMMARY: Retrieve an external account
    DESC: <p>Retrieve a specified external account for a given account.</p>
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/accounts/{account}/external_accounts/{id}
