      TYPE: "[]STRING"
      REQUIRED: true
      comment: Array of strings containing [categories](https://docs.stripe.com/api#issuing_authorization_object-merchant_data-category) of authorizations to decline. All other categories will be allowed. Cannot be set with `allowed_categories`.
    - name: blocked_merchant_countries
      NAME: blocked_merchant_countries
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: Array of strings containing representing countries from which authorizations will be declined. Country codes should be ISO 3166 alpha-2 country codes (e.g. `US`). Cannot be set with `allowed_merchant_countries`. Provide an empty value to unset this control.
