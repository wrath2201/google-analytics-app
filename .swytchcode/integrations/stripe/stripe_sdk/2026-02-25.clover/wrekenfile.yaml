      METHOD: POST
      ENDPOINT: /v1/setup_intents/{intent}/confirm
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
