      type: ANY
      TYPE: ANY
      REQUIRED: false
      comment: The data that automatically creates a Transfer after the payment finalizes. Learn more about the [use case for connected accounts](https://docs.stripe.com/payments/connected-accounts).
    - name: transfer_group
