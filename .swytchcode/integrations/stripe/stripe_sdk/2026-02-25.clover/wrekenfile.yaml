    - name: exp_month
      NAME: exp_month
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Two-digit number representing the card's expiration month.
    - name: exp_year
      NAME: exp_year
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Four-digit number representing the card's expiration year.
