        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: payment_intents.capture.create
  payment_intents.confirm.create:
    SUMMARY: Confirm a PaymentIntent
    DESC: |-
      <p>Confirm that your customer intends to pay with current or provided
      payment method. Upon confirmation, the PaymentIntent will attempt to initiate
      a payment.</p>

      <p>If the selected payment method requires additional authentication steps, the
      PaymentIntent will transition to the <code>requires_action</code> status and
      suggest additional actions via <code>next_action</code>. If payment fails,
      the PaymentIntent transitions to the <code>requires_payment_method</code> status or the
      <code>canceled</code> status if the confirmation limit is reached. If
      payment succeeds, the PaymentIntent will transition to the <code>succeeded</code>
      status (or <code>requires_capture</code>, if <code>capture_method</code> is set to <code>manual</code>).</p>

      <p>If the <code>confirmation_method</code> is <code>automatic</code>, payment may be attempted
      using our <a href="/docs/stripe-js/reference#stripe-handle-card-payment">client SDKs</a>
      and the PaymentIntent’s <a href="#payment_intent_object-client_secret">client_secret</a>.
      After <code>next_action</code>s are handled by the client, no additional
      confirmation is required to complete the payment.</p>

      <p>If the <code>confirmation_method</code> is <code>manual</code>, all payment attempts must be
      initiated using a secret key.</p>

      <p>If any actions are required for the payment, the PaymentIntent will
      return to the <code>requires_confirmation</code> state
      after those actions are completed. Your server needs to then
      explicitly re-confirm the PaymentIntent to initiate the next payment
      attempt.</p>

      <p>There is a variable upper limit on how many times a PaymentIntent can be confirmed.
      After this limit is reached, any further calls to this endpoint will
      transition the PaymentIntent to the <code>canceled</code> state.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/payment_intents/{intent}/confirm
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(payment_intent)
    INPUTS:
      - intent:
          TYPE: STRING
          LOCATION: path
      - amount_details:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - capture_method:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - confirmation_token:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - error_on_requires_action:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: body
      - excluded_payment_method_types:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - hooks:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - mandate:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - mandate_data:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - off_session:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - payment_details:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - payment_method:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - payment_method_data:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - payment_method_options:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - payment_method_types:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - radar_options:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - receipt_email:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - return_url:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - setup_future_usage:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - shipping:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - use_stripe_sdk:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(payment_intent)
        RETURNVAR: payment_intents_confirm_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: payment_intents_confirm_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: payment_intents.confirm.create
  payment_intents.increment_authorization.create:
    SUMMARY: Increment an authorization
    DESC: |-
      <p>Perform an incremental authorization on an eligible
      <a href="/docs/api/payment_intents/object">PaymentIntent</a>. To be eligible, the
      PaymentIntent’s status must be <code>requires_capture</code> and
      <a href="/docs/api/charges/object#charge_object-payment_method_details-card_present-incremental_authorization_supported">incremental_authorization_supported</a>
      must be <code>true</code>.</p>

      <p>Incremental authorizations attempt to increase the authorized amount on
      your customer’s card to the new, higher <code>amount</code> provided. Similar to the
      initial authorization, incremental authorizations can be declined. A
      single PaymentIntent can call this endpoint multiple times to further
      increase the authorized amount.</p>

      <p>If the incremental authorization succeeds, the PaymentIntent object
      returns with the updated
      <a href="/docs/api/payment_intents/object#payment_intent_object-amount">amount</a>.
      If the incremental authorization fails, a
      <a href="/docs/error-codes#card-declined">card_declined</a> error returns, and no other
      fields on the PaymentIntent or Charge update. The PaymentIntent
      object remains capturable for the previously authorized amount.</p>

      <p>Each PaymentIntent can have a maximum of 10 incremental authorization attempts, including declines.
      After it’s captured, a PaymentIntent can no longer be incremented.</p>

      <p>Learn more about <a href="/docs/terminal/features/incremental-authorizations">incremental authorizations</a>.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/payment_intents/{intent}/increment_authorization
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(payment_intent)
    INPUTS:
      - intent:
          TYPE: STRING
          LOCATION: path
      - amount:
          TYPE: INT
          LOCATION: body
      - amount_details:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - application_fee_amount:
          TYPE: INT
          REQUIRED: false
          LOCATION: body
      - description:
          TYPE: STRING
