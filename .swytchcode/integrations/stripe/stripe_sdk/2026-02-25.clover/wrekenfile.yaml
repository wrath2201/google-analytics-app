          REQUIRED: false
          LOCATION: body
      - automatic_tax:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - billing_cycle_anchor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - billing_thresholds:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - cancel_at:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - cancel_at_period_end:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: body
      - cancellation_details:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - collection_method:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - days_until_due:
          TYPE: INT
          REQUIRED: false
          LOCATION: body
      - default_payment_method:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - default_source:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - default_tax_rates:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - description:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - discounts:
          TYPE: ANY
