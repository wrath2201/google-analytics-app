VERSION: 2.0.2
DEFAULTS:
  bearer_token: BEARER <ACCESS_TOKEN>
  w_base_url: https://analyticsdata.googleapis.com
METHODS:
  v1beta.{property}:runreport.create:
    SUMMARY: Run a report
    DESC: |
      Returns a customized report of your Google Analytics event data. Reports
      contain statistics derived from data collected by the GA4 tracking code.
      Maximum 9 dimensions per request.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1beta/{property}:runReport
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(RunReportRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RunReportResponse)
    INPUTS:
      - property:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(RunReportRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(RunReportResponse)
        RETURNVAR: v1beta_{property}:runreport_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 429
        WHEN: Client error (HTTP 429)
    CANONICAL_ID: v1beta.{property}:runreport.create
  v1beta.{property}:batchrunreport.create:
    SUMMARY: Batch run up to 5 reports
    DESC: |
      Returns multiple reports in a single call. Each request in the batch is
      an independent `RunReportRequest`. Maximum 5 requests per batch.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1beta/{property}:batchRunReports
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchRunReportsRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchRunReportsResponse)
    INPUTS:
      - property:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BatchRunReportsRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchRunReportsResponse)
        RETURNVAR: v1beta_{property}:batchrunreport_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 429
        WHEN: Client error (HTTP 429)
    CANONICAL_ID: v1beta.{property}:batchrunreport.create
  v1beta.{property}:runpivotreport.create:
    SUMMARY: Run a pivot report
    DESC: |
      Returns a customized pivot table of your Google Analytics event data.
      The product of all `pivot.limit` values must not exceed 100,000.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1beta/{property}:runPivotReport
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(RunPivotReportRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RunPivotReportResponse)
    INPUTS:
      - property:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(RunPivotReportRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(RunPivotReportResponse)
        RETURNVAR: v1beta_{property}:runpivotreport_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 429
        WHEN: Client error (HTTP 429)
    CANONICAL_ID: v1beta.{property}:runpivotreport.create
  v1beta.{property}:batchrunpivotreport.create:
    SUMMARY: Batch run up to 5 pivot reports
    DESC: Maximum 5 pivot report requests per batch call.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1beta/{property}:batchRunPivotReports
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(BatchRunPivotReportsRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(BatchRunPivotReportsResponse)
    INPUTS:
      - property:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(BatchRunPivotReportsRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(BatchRunPivotReportsResponse)
        RETURNVAR: v1beta_{property}:batchrunpivotreport_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 429
        WHEN: Client error (HTTP 429)
    CANONICAL_ID: v1beta.{property}:batchrunpivotreport.create
  v1beta.{property}:runrealtimereport.create:
    SUMMARY: Run a real-time report
    DESC: |
      Returns real-time event data for the property. Events appear in the report
      within 30 seconds to a few minutes. Supports a 30–60 minute lookback window
      via `minuteRanges`.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1beta/{property}:runRealtimeReport
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(RunRealtimeReportRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RunRealtimeReportResponse)
    INPUTS:
      - property:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(RunRealtimeReportRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(RunRealtimeReportResponse)
        RETURNVAR: v1beta_{property}:runrealtimereport_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 429
        WHEN: Client error (HTTP 429)
    CANONICAL_ID: v1beta.{property}:runrealtimereport.create
  v1beta.metadata.get:
    SUMMARY: Get metadata
    DESC: |
      Returns metadata for dimensions and metrics available in reporting methods.
      Use `properties/0` to retrieve universal metadata applicable to all properties.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1beta/{name}/metadata
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(MetadataResponse)
    INPUTS:
      - name:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(MetadataResponse)
        RETURNVAR: v1beta_metadata_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: v1beta.metadata.get
  v1beta.{property}:checkcompatibility.create:
    SUMMARY: Check dimension and metric compatibility
    DESC: |
      Verifies which dimensions and metrics are compatible with each other and
      with any applied filters for a given report request.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1beta/{property}:checkCompatibility
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(CheckCompatibilityRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(CheckCompatibilityResponse)
    INPUTS:
      - property:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(CheckCompatibilityRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(CheckCompatibilityResponse)
        RETURNVAR: v1beta_{property}:checkcompatibility_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: v1beta.{property}:checkcompatibility.create
  v1beta.audienceexport.create:
    SUMMARY: Create an audience export
    DESC: |
      Creates an audience export for later querying. An audience export is a
      snapshot of the users in an audience at the time of the export's creation.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1beta/{parent}/audienceExports
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(AudienceExport)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(Operation)
    INPUTS:
      - parent:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(AudienceExport)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(Operation)
        RETURNVAR: v1beta_audienceexport_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: v1beta.audienceexport.create
  v1beta.audienceexport.get:
    SUMMARY: List audience exports
    DESC: Lists all audience exports for a property.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1beta/{parent}/audienceExports
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ListAudienceExportsResponse)
    INPUTS:
      - parent:
          TYPE: STRING
          LOCATION: path
      - pageSize:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - pageToken:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(ListAudienceExportsResponse)
        RETURNVAR: v1beta_audienceexport_get
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: v1beta.audienceexport.get
  v1beta.audienceexport.get_6b48:
    SUMMARY: Get an audience export
    DESC: Gets configuration metadata about a specific audience export.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1beta/{name}/audienceExports/{audienceExportId}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(AudienceExport)
    INPUTS:
      - name:
          TYPE: STRING
          LOCATION: path
      - audienceExportId:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(AudienceExport)
        RETURNVAR: v1beta_audienceexport_get_6b48
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
      - TYPE: ANY
        STATUS: 404
        WHEN: Client error (HTTP 404)
    CANONICAL_ID: v1beta.audienceexport.get_6b48
  v1beta.audienceexport.{audienceExportId}:query.create:
    SUMMARY: Query an audience export
    DESC: Retrieves an audience export which was previously created.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1beta/{name}/audienceExports/{audienceExportId}:query
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(v1beta.audienceexport.{audienceExportId}:query.createRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(QueryAudienceExportResponse)
    INPUTS:
      - name:
          TYPE: STRING
          LOCATION: path
      - audienceExportId:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(v1beta.audienceexport.{audienceExportId}:query.createRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(QueryAudienceExportResponse)
        RETURNVAR: v1beta_audienceexport_{audienceExportId}:query_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: v1beta.audienceexport.{audienceExportId}:query.create
  v1alpha.{property}:runfunnelreport.create:
    SUMMARY: Run a funnel report (alpha)
    DESC: |
      Returns a funnel report with step-by-step conversion analysis.
      Supports up to 4 segments. This is an **early-access** endpoint and may change.
    HTTP:
      METHOD: POST
      ENDPOINT: /v1alpha/{property}:runFunnelReport
      HEADERS:
        Content-Type: application/json
        Authorization: bearer_token
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(RunFunnelReportRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RunFunnelReportResponse)
    INPUTS:
      - property:
          TYPE: STRING
          LOCATION: path
      - body:
          TYPE: STRUCT(RunFunnelReportRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(RunFunnelReportResponse)
        RETURNVAR: v1alpha_{property}:runfunnelreport_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
      - TYPE: ANY
        STATUS: 401
        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: v1alpha.{property}:runfunnelreport.create
  v1alpha.propertyquotassnapshot.get:
    SUMMARY: Get property quota snapshot (alpha)
    DESC: |
      Returns the current state of all quotas for a property. This is an
      **early-access** endpoint.
    HTTP:
      METHOD: GET
      ENDPOINT: /v1alpha/{property}/propertyQuotasSnapshot
      HEADERS:
