  payment_intents.payment_intent.get:
    SUMMARY: Retrieve a PaymentIntent
    DESC: |-
      <p>Retrieves the details of a PaymentIntent that has previously been created. </p>

      <p>You can retrieve a PaymentIntent client-side using a publishable key when the <code>client_secret</code> is in the query string. </p>

      <p>If you retrieve a PaymentIntent with a publishable key, it only returns a subset of properties. Refer to the <a href="#payment_intent_object">payment intent</a> object reference for more details.</p>
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/payment_intents/{intent}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(payment_intent)
    INPUTS:
      - client_secret:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - intent:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(payment_intent)
        RETURNVAR: payment_intents_payment_intent_get
        STATUS: 200
