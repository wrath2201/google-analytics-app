      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SendEmailRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SendEmailResponse)
    INPUTS:
      - Idempotency-Key:
          TYPE: STRING
          REQUIRED: false
          LOCATION: header
      - body:
          TYPE: STRUCT(SendEmailRequest)
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SendEmailResponse)
