    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(external_account)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: path
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - id:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(external_account)
        RETURNVAR: accounts_external_account_get_8381
