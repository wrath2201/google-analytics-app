  payment_intents.search.list:
    SUMMARY: Search PaymentIntents
    DESC: |-
      <p>Search for PaymentIntents you’ve previously created using Stripe’s <a href="/docs/search#search-query-language">Search Query Language</a>.
      Don’t use search in read-after-write flows where strict consistency is necessary. Under normal operating
      conditions, data is searchable in less than a minute. Occasionally, propagation of new or updated data can be up
      to an hour behind during outages. Search functionality is not available to merchants in India.</p>
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/payment_intents/search
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(payment_intents.search.listResponse200)
    INPUTS:
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - page:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - query:
          TYPE: STRING
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(payment_intents.search.listResponse200)
        RETURNVAR: payment_intents_search_list
        STATUS: 200
