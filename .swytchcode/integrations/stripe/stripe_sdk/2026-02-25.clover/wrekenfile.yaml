  api_errors:
    - name: advice_code
      NAME: advice_code
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: For card errors resulting from a card issuer decline, a short string indicating [how to proceed with an error](https://docs.stripe.com/declines#retrying-issuer-declines) if they provide one.
    - name: charge
      NAME: charge
