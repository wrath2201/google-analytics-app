          REQUIRED: false
          LOCATION: body
      - payment_method_options:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - return_url:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - use_stripe_sdk:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(setup_intent)
        RETURNVAR: setup_intents_confirm_create
