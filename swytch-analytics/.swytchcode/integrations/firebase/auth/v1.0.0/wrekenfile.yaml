VERSION: 2.0.2
DEFAULTS:
  query_key: <KEY>
  w_base_url: https://identitytoolkit.googleapis.com/v1
METHODS:
  accounts:signup.accounts:signup.create:
    SUMMARY: Sign up with email/password or create anonymous user
    DESC: |
      Creates a new email/password user, or creates an anonymous account if no
      email/password is provided. Can also be used to upgrade an anonymous account
      by providing an `idToken`.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:signUp
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SignUpRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SignUpResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SignUpRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignUpResponse)
        RETURNVAR: accounts:signup_accounts:signup_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:signup.accounts:signup.create
  accounts:signinwithpassword.accounts:signinwithpassword.create:
    SUMMARY: Sign in with email and password
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:signInWithPassword
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SignInWithPasswordRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SignInWithPasswordResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SignInWithPasswordRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignInWithPasswordResponse)
        RETURNVAR: accounts:signinwithpassword_accounts:signinwithpassword_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:signinwithpassword.accounts:signinwithpassword.create
  accounts:signinwithcustomtoken.accounts:signinwithcustomtoken.create:
    SUMMARY: Sign in with a custom token
    DESC: Exchanges a custom Auth token (JWT) for Identity Platform credentials.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:signInWithCustomToken
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SignInWithCustomTokenRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SignInWithCustomTokenResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SignInWithCustomTokenRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignInWithCustomTokenResponse)
        RETURNVAR: accounts:signinwithcustomtoken_accounts:signinwithcustomtoken_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:signinwithcustomtoken.accounts:signinwithcustomtoken.create
  accounts:signinwithidp.accounts:signinwithidp.create:
    SUMMARY: Sign in with an Identity Provider (OAuth)
    DESC: |
      Signs in using credentials from a third-party provider such as Google,
      Facebook, GitHub, etc. Use this after obtaining the provider's token.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:signInWithIdp
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SignInWithIdpRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SignInWithIdpResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SignInWithIdpRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignInWithIdpResponse)
        RETURNVAR: accounts:signinwithidp_accounts:signinwithidp_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:signinwithidp.accounts:signinwithidp.create
  accounts:signinwithemaillink.accounts:signinwithemaillink.create:
    SUMMARY: Sign in with email link
    DESC: Signs in a user using an OOB code sent to their email address.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:signInWithEmailLink
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SignInWithEmailLinkRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SignInWithEmailLinkResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SignInWithEmailLinkRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignInWithEmailLinkResponse)
        RETURNVAR: accounts:signinwithemaillink_accounts:signinwithemaillink_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:signinwithemaillink.accounts:signinwithemaillink.create
  accounts:signinwithphonenumber.accounts:signinwithphonenumber.create:
    SUMMARY: Sign in with phone number
    DESC: |
      Completes phone number sign-in using a verification code from an SMS.
      Requires prior phone verification via the `sendVerificationCode` endpoint.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:signInWithPhoneNumber
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SignInWithPhoneNumberRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SignInWithPhoneNumberResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SignInWithPhoneNumberRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SignInWithPhoneNumberResponse)
        RETURNVAR: accounts:signinwithphonenumber_accounts:signinwithphonenumber_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:signinwithphonenumber.accounts:signinwithphonenumber.create
  accounts:lookup.accounts:lookup.create:
    SUMMARY: Get account information
    DESC: |
      Retrieves account information for the authenticated user. Admin operations
      (lookups by `localId`, `email`, `phoneNumber`) require OAuth credentials.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:lookup
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(LookupRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(LookupResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(LookupRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(LookupResponse)
        RETURNVAR: accounts:lookup_accounts:lookup_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:lookup.accounts:lookup.create
  accounts:update.accounts:update.create:
    SUMMARY: Update account information
    DESC: |
      Updates email, password, display name, photo URL, phone number, or other
      account attributes. Requires a valid `idToken`. Admin operations require
      OAuth credentials.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:update
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(UpdateRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(UpdateResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(UpdateRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(UpdateResponse)
        RETURNVAR: accounts:update_accounts:update_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:update.accounts:update.create
  accounts:delete.accounts:delete.create:
    SUMMARY: Delete a user account
    DESC: |
      Deletes the account identified by the provided `idToken`. Admin operations
      can delete by `localId` using OAuth credentials.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:delete
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(DeleteRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(DeleteResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(DeleteRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(DeleteResponse)
        RETURNVAR: accounts:delete_accounts:delete_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:delete.accounts:delete.create
  accounts:sendoobcode.accounts:sendoobcode.create:
    SUMMARY: Send out-of-band confirmation code
    DESC: |
      Sends an out-of-band code for password reset, email sign-in link,
      email address verification, or email change verification.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:sendOobCode
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(SendOobCodeRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(SendOobCodeResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(SendOobCodeRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(SendOobCodeResponse)
        RETURNVAR: accounts:sendoobcode_accounts:sendoobcode_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:sendoobcode.accounts:sendoobcode.create
  accounts:resetpassword.accounts:resetpassword.create:
    SUMMARY: Reset or change password
    DESC: |
      Resets the user's password using an OOB code from `sendOobCode`, or
      changes the password directly using the current password.
      Sending only `oobCode` (without `newPassword`) validates the code without consuming it.
    HTTP:
      METHOD: POST
      ENDPOINT: /accounts:resetPassword
      HEADERS:
        Content-Type: application/json
      CONTENT_TYPE: application/json
      ACCEPT: application/json
      BODY:
        TYPE: STRUCT(ResetPasswordRequest)
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(ResetPasswordResponse)
    INPUTS:
      - body:
          TYPE: STRUCT(ResetPasswordRequest)
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(ResetPasswordResponse)
        RETURNVAR: accounts:resetpassword_accounts:resetpassword_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: accounts:resetpassword.accounts:resetpassword.create
  token.token.create:
    SUMMARY: Refresh an ID token
    DESC: |
      Exchanges a refresh token for a new ID token.

      **Note:** This endpoint is hosted at `https://securetoken.googleapis.com/v1`,
      not the Identity Toolkit base URL.

      Request body must be `application/x-www-form-urlencoded`.
    HTTP:
      METHOD: POST
      ENDPOINT: /token
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(RefreshTokenResponse)
    RETURNS:
      - RETURNTYPE: STRUCT(RefreshTokenResponse)
        RETURNVAR: token_token_create
        STATUS: 200
    ERRORS:
      - TYPE: ANY
        STATUS: 400
        WHEN: Client error (HTTP 400)
    CANONICAL_ID: token.token.create
