          LOCATION: path
      - capability:
          TYPE: STRING
          LOCATION: path
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(capability)
        RETURNVAR: accounts_capability_get_977a
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_capability_get_977a_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.capability.get_977a
  accounts.capability.create:
    SUMMARY: Update an Account Capability
    DESC: <p>Updates an existing Account Capability. Request or remove a capability by updating its <code>requested</code> parameter.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/accounts/{account}/capabilities/{capability}
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(capability)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: path
      - capability:
          TYPE: STRING
          LOCATION: path
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - requested:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(capability)
        RETURNVAR: accounts_capability_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_capability_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.capability.create
  accounts.external_account.get:
    SUMMARY: List all external accounts
    DESC: <p>List external accounts for an account.</p>
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/accounts/{account}/external_accounts
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(accounts.external_account.getResponse200)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: path
      - ending_before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
