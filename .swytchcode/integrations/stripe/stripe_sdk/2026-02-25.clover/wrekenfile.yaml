      - starting_after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(accounts.external_account.getResponse200)
        RETURNVAR: accounts_external_account_get
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_external_account_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.external_account.get
  accounts.external_account.create:
    SUMMARY: Create an external account
    DESC: <p>Create an external account for a given account.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/accounts/{account}/external_accounts
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(external_account)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: path
      - default_for_currency:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - external_account:
          TYPE: STRING
          LOCATION: body
      - metadata:
          TYPE: map[STRING]STRING
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(external_account)
        RETURNVAR: accounts_external_account_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_external_account_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.external_account.create
  accounts.external_account.delete:
    SUMMARY: Delete an external account
    DESC: <p>Delete a specified external account for a given account.</p>
    HTTP:
      METHOD: DELETE
      ENDPOINT: /v1/accounts/{account}/external_accounts/{id}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
