          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - invoice_settings:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - items:
          TYPE: "[]ANY"
