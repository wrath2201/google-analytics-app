      TYPE: STRUCT(payment_source)
      REQUIRED: false
    - name: type
      NAME: type
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The type of error returned. One of `api_error`, `card_error`, `idempotency_error`, or `invalid_request_error`
  payment_intent:
    - name: amount
      NAME: amount
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Amount intended to be collected by this PaymentIntent. A positive integer representing how much to charge in the [smallest currency unit](https://docs.stripe.com/currencies#zero-decimal) (e.g., 100 cents to charge $1.00 or 100 to charge ¥100, a zero-decimal currency). The minimum amount is $0.50 US or [equivalent in charge currency](https://docs.stripe.com/currencies#minimum-and-maximum-charge-amounts). The amount value supports up to eight digits (e.g., a value of 99999999 for a USD charge of $999,999.99).
    - name: amount_capturable
      NAME: amount_capturable
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Amount that can be captured from this PaymentIntent.
    - name: amount_details
      NAME: amount_details
      type: STRUCT(payment_flows_amount_details)
      TYPE: STRUCT(payment_flows_amount_details)
      REQUIRED: false
    - name: amount_received
      NAME: amount_received
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Amount that this PaymentIntent collects.
    - name: application
      NAME: application
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the Connect application that created the PaymentIntent.
    - name: application_fee_amount
      NAME: application_fee_amount
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The amount of the application fee (if any) that will be requested to be applied to the payment and transferred to the application owner's Stripe account. The amount of the application fee collected will be capped at the total amount captured. For more information, see the PaymentIntents [use case for connected accounts](https://docs.stripe.com/payments/connected-accounts).
    - name: automatic_payment_methods
      NAME: automatic_payment_methods
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: Settings to configure compatible payment methods from the [Stripe Dashboard](https://dashboard.stripe.com/settings/payment_methods)
    - name: canceled_at
      NAME: canceled_at
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Populated when `status` is `canceled`, this is the time at which the PaymentIntent was canceled. Measured in seconds since the Unix epoch.
    - name: cancellation_reason
      NAME: cancellation_reason
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Reason for cancellation of this PaymentIntent, either user-provided (`duplicate`, `fraudulent`, `requested_by_customer`, or `abandoned`) or generated by Stripe internally (`failed_invoice`, `void_invoice`, `automatic`, or `expired`).
    - name: capture_method
      NAME: capture_method
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Controls when the funds will be captured from the customer's account.
    - name: client_secret
      NAME: client_secret
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The client secret of this PaymentIntent. Used for client-side retrieval using a publishable key.

        The client secret can be used to complete a payment from your frontend. It should not be stored, logged, or exposed to anyone other than the customer. Make sure that you have TLS enabled on any page that includes the client secret.

        Refer to our docs to [accept a payment](https://docs.stripe.com/payments/accept-a-payment?ui=elements) and learn about how `client_secret` should be handled.
    - name: confirmation_method
      NAME: confirmation_method
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Describes whether we can confirm this PaymentIntent automatically, or if it requires customer action to confirm the payment.
    - name: created
      NAME: created
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Time at which the object was created. Measured in seconds since the Unix epoch.
    - name: currency
      NAME: currency
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
    - name: customer
      NAME: customer
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: |-
        ID of the Customer this PaymentIntent belongs to, if one exists.

        Payment methods attached to other Customers cannot be used with this PaymentIntent.

        If [setup_future_usage](https://api.stripe.com#payment_intent_object-setup_future_usage) is set and this PaymentIntent's payment method is not `card_present`, then the payment method attaches to the Customer after the PaymentIntent has been confirmed and any required actions from the user are complete. If the payment method is `card_present` and isn't a digital wallet, then a [generated_card](https://docs.stripe.com/api/charges/object#charge_object-payment_method_details-card_present-generated_card) payment method representing the card is created and attached to the Customer instead.
    - name: customer_account
      NAME: customer_account
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        ID of the Account representing the customer that this PaymentIntent belongs to, if one exists.

        Payment methods attached to other Accounts cannot be used with this PaymentIntent.

        If [setup_future_usage](https://api.stripe.com#payment_intent_object-setup_future_usage) is set and this PaymentIntent's payment method is not `card_present`, then the payment method attaches to the Account after the PaymentIntent has been confirmed and any required actions from the user are complete. If the payment method is `card_present` and isn't a digital wallet, then a [generated_card](https://docs.stripe.com/api/charges/object#charge_object-payment_method_details-card_present-generated_card) payment method representing the card is created and attached to the Account instead.
    - name: description
      NAME: description
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: An arbitrary string attached to the object. Often useful for displaying to users.
    - name: excluded_payment_method_types
      NAME: excluded_payment_method_types
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: The list of payment method types to exclude from use with this payment.
    - name: hooks
      NAME: hooks
      type: STRUCT(payment_flows_payment_intent_async_workflows)
      TYPE: STRUCT(payment_flows_payment_intent_async_workflows)
      REQUIRED: false
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Unique identifier for the object.
    - name: last_payment_error
      NAME: last_payment_error
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The payment error encountered in the previous PaymentIntent confirmation. It will be cleared if the PaymentIntent is later updated for any reason.
    - name: latest_charge
      NAME: latest_charge
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the latest [Charge object](https://docs.stripe.com/api/charges) created by this PaymentIntent. This property is `null` until PaymentIntent confirmation is attempted.
    - name: livemode
      NAME: livemode
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: If the object exists in live mode, the value is `true`. If the object exists in test mode, the value is `false`.
    - name: metadata
      NAME: metadata
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: true
      comment: Set of [key-value pairs](https://docs.stripe.com/api/metadata) that you can attach to an object. This can be useful for storing additional information about the object in a structured format. Learn more about [storing information in metadata](https://docs.stripe.com/payments/payment-intents/creating-payment-intents#storing-information-in-metadata).
    - name: next_action
      NAME: next_action
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: If present, this property tells you what actions you need to take in order for your customer to fulfill a payment using the provided source.
    - name: object
      NAME: object
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: String representing the object's type. Objects of the same type share the same value.
    - name: on_behalf_of
      NAME: on_behalf_of
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: |-
        You can specify the settlement merchant as the
        connected account using the `on_behalf_of` attribute on the charge. See the PaymentIntents [use case for connected accounts](/payments/connected-accounts) for details.
    - name: payment_details
      NAME: payment_details
      type: STRUCT(payment_flows_payment_details)
      TYPE: STRUCT(payment_flows_payment_details)
      REQUIRED: false
    - name: payment_method
      NAME: payment_method
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the payment method used in this PaymentIntent.
    - name: payment_method_configuration_details
      NAME: payment_method_configuration_details
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: Information about the [payment method configuration](https://docs.stripe.com/api/payment_method_configurations) used for this PaymentIntent.
    - name: payment_method_options
      NAME: payment_method_options
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: Payment-method-specific configuration for this PaymentIntent.
    - name: payment_method_types
      NAME: payment_method_types
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: The list of payment method types (e.g. card) that this PaymentIntent is allowed to use. A comprehensive list of valid payment method types can be found [here](https://docs.stripe.com/api/payment_methods/object#payment_method_object-type).
    - name: presentment_details
      NAME: presentment_details
      type: STRUCT(payment_flows_payment_intent_presentment_details)
      TYPE: STRUCT(payment_flows_payment_intent_presentment_details)
      REQUIRED: false
    - name: processing
      NAME: processing
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: If present, this property tells you about the processing state of the payment.
    - name: receipt_email
      NAME: receipt_email
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Email address that the receipt for the resulting payment will be sent to. If `receipt_email` is specified for a payment in live mode, a receipt will be sent regardless of your [email settings](https://dashboard.stripe.com/account/emails).
    - name: review
      NAME: review
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the review associated with this PaymentIntent, if any.
    - name: setup_future_usage
      NAME: setup_future_usage
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        Indicates that you intend to make future payments with this PaymentIntent's payment method.

        If you provide a Customer with the PaymentIntent, you can use this parameter to [attach the payment method](/payments/save-during-payment) to the Customer after the PaymentIntent is confirmed and the customer completes any required actions. If you don't provide a Customer, you can still [attach](/api/payment_methods/attach) the payment method to a Customer after the transaction completes.

        If the payment method is `card_present` and isn't a digital wallet, Stripe creates and attaches a [generated_card](/api/charges/object#charge_object-payment_method_details-card_present-generated_card) payment method representing the card to the Customer instead.

        When processing card payments, Stripe uses `setup_future_usage` to help you comply with regional legislation and network rules, such as [SCA](/strong-customer-authentication).
    - name: shipping
      NAME: shipping
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: Shipping information for this PaymentIntent.
    - name: source
      NAME: source
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: This is a legacy field that will be removed in the future. It is the ID of the Source object that is associated with this PaymentIntent, if one was supplied.
    - name: statement_descriptor
      NAME: statement_descriptor
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        Text that appears on the customer's statement as the statement descriptor for a non-card charge. This value overrides the account's default statement descriptor. For information about requirements, including the 22-character limit, see [the Statement Descriptor docs](https://docs.stripe.com/get-started/account/statement-descriptors).

        Setting this value for a card charge returns an error. For card charges, set the [statement_descriptor_suffix](https://docs.stripe.com/get-started/account/statement-descriptors#dynamic) instead.
    - name: statement_descriptor_suffix
      NAME: statement_descriptor_suffix
