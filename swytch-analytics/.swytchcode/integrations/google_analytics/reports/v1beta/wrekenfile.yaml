      RESULT:
        TYPE: STRUCT(PropertyQuotasSnapshot)
    INPUTS:
      - property:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(PropertyQuotasSnapshot)
