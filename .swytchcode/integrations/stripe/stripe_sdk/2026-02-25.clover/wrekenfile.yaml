VERSION: 2.0.2
DEFAULTS:
  basic_auth: Basic <BASE64>
  bearer_token: BEARER <TOKEN>
  w_base_url: https://api.stripe.com
METHODS:
  account.account.list:
    SUMMARY: Retrieve account
    DESC: <p>Retrieves the details of an account.</p>
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/account
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(account)
    INPUTS:
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(account)
        RETURNVAR: account_account_list
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: account_account_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: account.account.list
  account_links.account_link.create:
    SUMMARY: Create an account link
    DESC: <p>Creates an AccountLink object that includes a single-use Stripe URL that the platform can redirect their user to in order to take them through the Connect Onboarding flow.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/account_links
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(account_link)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: body
      - collect:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - collection_options:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - refresh_url:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - return_url:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - type:
          TYPE: STRING
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(account_link)
        RETURNVAR: account_links_account_link_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: account_links_account_link_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: account_links.account_link.create
  account_sessions.account_session.create:
    SUMMARY: Create an Account Session
    DESC: <p>Creates a AccountSession object that includes a single-use token that the platform can use on their front-end to grant client-side API access.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/account_sessions
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(account_session)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: body
      - components:
          TYPE: OBJECT
          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(account_session)
        RETURNVAR: account_sessions_account_session_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: account_sessions_account_session_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: account_sessions.account_session.create
  accounts.account.list:
    SUMMARY: List all connected accounts
    DESC: <p>Returns a list of accounts connected to your platform via <a href="/docs/connect">Connect</a>. If you’re not a platform, the list is empty.</p>
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/accounts
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(accounts.account.listResponse200)
    INPUTS:
      - created:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - ending_before:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
      - limit:
          TYPE: INT
          REQUIRED: false
          LOCATION: query
      - starting_after:
          TYPE: STRING
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(accounts.account.listResponse200)
        RETURNVAR: accounts_account_list
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_account_list_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.account.list
  accounts.account.create:
    SUMMARY: <p>With <a href="/docs/connect">Connect</a>, you can create Stripe accounts for your users
    DESC: |-
      <p>With <a href="/docs/connect">Connect</a>, you can create Stripe accounts for your users.
      To do this, you’ll first need to <a href="https://dashboard.stripe.com/account/applications/settings">register your platform</a>.</p>

      <p>If you’ve already collected information for your connected accounts, you <a href="/docs/connect/best-practices#onboarding">can prefill that information</a> when
      creating the account. Connect Onboarding won’t ask for the prefilled information during account onboarding.
      You can prefill any information on the account.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/accounts
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(account)
    INPUTS:
      - account_token:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - business_profile:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - business_type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - capabilities:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - company:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - controller:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - country:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - default_currency:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - documents:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - email:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - external_account:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - groups:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - individual:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - metadata:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - settings:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - tos_acceptance:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(account)
        RETURNVAR: accounts_account_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_account_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.account.create
  accounts.account.delete:
    SUMMARY: Delete an account
    DESC: |-
      <p>With <a href="/connect">Connect</a>, you can delete accounts you manage.</p>

      <p>Test-mode accounts can be deleted at any time.</p>

      <p>Live-mode accounts that have access to the standard dashboard and Stripe is responsible for negative account balances cannot be deleted, which includes Standard accounts. All other Live-mode accounts, can be deleted when all <a href="/api/balance/balance_object">balances</a> are zero.</p>

      <p>If you want to delete your own account, use the <a href="https://dashboard.stripe.com/settings/account">account information tab in your account settings</a> instead.</p>
    HTTP:
      METHOD: DELETE
      ENDPOINT: /v1/accounts/{account}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(deleted_account)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: path
    RETURNS:
      - RETURNTYPE: STRUCT(deleted_account)
        RETURNVAR: accounts_account_delete
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_account_delete_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.account.delete
  accounts.account.get:
    SUMMARY: Retrieve account
    DESC: <p>Retrieves the details of an account.</p>
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/accounts/{account}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(account)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: path
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(account)
        RETURNVAR: accounts_account_get
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_account_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.account.get
  accounts.account.create_5c0:
    SUMMARY: Update an account
    DESC: |-
      <p>Updates a <a href="/connect/accounts">connected account</a> by setting the values of the parameters passed. Any parameters not provided are
      left unchanged.</p>

      <p>For accounts where <a href="/api/accounts/object#account_object-controller-requirement_collection">controller.requirement_collection</a>
      is <code>application</code>, which includes Custom accounts, you can update any information on the account.</p>

      <p>For accounts where <a href="/api/accounts/object#account_object-controller-requirement_collection">controller.requirement_collection</a>
      is <code>stripe</code>, which includes Standard and Express accounts, you can update all information until you create
      an <a href="/api/account_links">Account Link</a> or <a href="/api/account_sessions">Account Session</a> to start Connect onboarding,
      after which some properties can no longer be updated.</p>

      <p>To update your own account, use the <a href="https://dashboard.stripe.com/settings/account">Dashboard</a>. Refer to our
      <a href="/docs/connect/updating-accounts">Connect</a> documentation to learn more about updating accounts.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/accounts/{account}
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(account)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: path
      - account_token:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - business_profile:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - business_type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - capabilities:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - company:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - default_currency:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - documents:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - email:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - external_account:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - groups:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - individual:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - metadata:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - settings:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - tos_acceptance:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(account)
        RETURNVAR: accounts_account_create_5c0
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_account_create_5c0_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.account.create_5c0
  accounts.capability.get:
    SUMMARY: List all account capabilities
    DESC: <p>Returns a list of capabilities associated with the account. The capabilities are returned sorted by creation date, with the most recent capability appearing first.</p>
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/accounts/{account}/capabilities
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(accounts.capability.getResponse200)
    INPUTS:
      - account:
          TYPE: STRING
          LOCATION: path
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: query
    RETURNS:
      - RETURNTYPE: STRUCT(accounts.capability.getResponse200)
        RETURNVAR: accounts_capability_get
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_capability_get_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.capability.get
  accounts.capability.get_977a:
    SUMMARY: Retrieve an Account Capability
    DESC: <p>Retrieves information about the specified Account Capability.</p>
    HTTP:
      METHOD: GET
      ENDPOINT: /v1/accounts/{account}/capabilities/{capability}
      HEADERS:
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
