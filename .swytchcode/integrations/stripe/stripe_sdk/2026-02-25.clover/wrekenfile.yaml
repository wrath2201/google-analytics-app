      TYPE: STRING
      REQUIRED: true
      comment: |-
        A unique value assigned by the business to identify the transaction. Required for L2 and L3 rates.

        For Cards, this field is truncated to 25 alphanumeric characters, excluding spaces, before being sent to card networks. For Klarna, this field is truncated to 255 characters and is visible to customers when they view the order in the Klarna app.
  setup_intent:
    - name: application
      NAME: application
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the Connect application that created the SetupIntent.
    - name: attach_to_self
      NAME: attach_to_self
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: |-
        If present, the SetupIntent's payment method will be attached to the in-context Stripe Account.

        It can only be used for this Stripe Account’s own money movement flows like InboundTransfer and OutboundTransfers. It cannot be set to true when setting up a PaymentMethod for a Customer, and defaults to false when attaching a PaymentMethod to a Customer.
    - name: automatic_payment_methods
      NAME: automatic_payment_methods
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: Settings for dynamic payment methods compatible with this Setup Intent
    - name: cancellation_reason
      NAME: cancellation_reason
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Reason for cancellation of this SetupIntent, one of `abandoned`, `requested_by_customer`, or `duplicate`.
    - name: client_secret
      NAME: client_secret
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        The client secret of this SetupIntent. Used for client-side retrieval using a publishable key.

        The client secret can be used to complete payment setup from your frontend. It should not be stored, logged, or exposed to anyone other than the customer. Make sure that you have TLS enabled on any page that includes the client secret.
    - name: created
      NAME: created
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Time at which the object was created. Measured in seconds since the Unix epoch.
    - name: customer
      NAME: customer
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: |-
        ID of the Customer this SetupIntent belongs to, if one exists.

        If present, the SetupIntent's payment method will be attached to the Customer on successful setup. Payment methods attached to other Customers cannot be used with this SetupIntent.
    - name: customer_account
      NAME: customer_account
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: |-
        ID of the Account this SetupIntent belongs to, if one exists.

        If present, the SetupIntent's payment method will be attached to the Account on successful setup. Payment methods attached to other Accounts cannot be used with this SetupIntent.
    - name: description
      NAME: description
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: An arbitrary string attached to the object. Often useful for displaying to users.
    - name: excluded_payment_method_types
      NAME: excluded_payment_method_types
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: Payment method types that are excluded from this SetupIntent.
    - name: flow_directions
      NAME: flow_directions
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: |-
        Indicates the directions of money movement for which this payment method is intended to be used.

        Include `inbound` if you intend to use the payment method as the origin to pull funds from. Include `outbound` if you intend to use the payment method as the destination to send funds to. You can include both if you intend to use the payment method for both purposes.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Unique identifier for the object.
    - name: last_setup_error
      NAME: last_setup_error
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The error encountered in the previous SetupIntent confirmation.
    - name: latest_attempt
      NAME: latest_attempt
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The most recent SetupAttempt for this SetupIntent.
    - name: livemode
      NAME: livemode
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: If the object exists in live mode, the value is `true`. If the object exists in test mode, the value is `false`.
    - name: mandate
      NAME: mandate
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the multi use Mandate generated by the SetupIntent.
    - name: metadata
      NAME: metadata
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: true
      comment: Set of [key-value pairs](https://docs.stripe.com/api/metadata) that you can attach to an object. This can be useful for storing additional information about the object in a structured format.
    - name: next_action
      NAME: next_action
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: If present, this property tells you what actions you need to take in order for your customer to continue payment setup.
    - name: object
      NAME: object
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: String representing the object's type. Objects of the same type share the same value.
    - name: on_behalf_of
      NAME: on_behalf_of
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The account (if any) for which the setup is intended.
    - name: payment_method
      NAME: payment_method
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the payment method used with this SetupIntent. If the payment method is `card_present` and isn't a digital wallet, then the [generated_card](https://docs.stripe.com/api/setup_attempts/object#setup_attempt_object-payment_method_details-card_present-generated_card) associated with the `latest_attempt` is attached to the Customer instead.
    - name: payment_method_configuration_details
      NAME: payment_method_configuration_details
      type: ANY
