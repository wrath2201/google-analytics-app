      REQUIRED: true
      comment: Information about the [payment method configuration](https://docs.stripe.com/api/payment_method_configurations) used for this Setup Intent.
    - name: payment_method_options
      NAME: payment_method_options
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: Payment method-specific configuration for this SetupIntent.
    - name: payment_method_types
      NAME: payment_method_types
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: The list of payment method types (e.g. card) that this SetupIntent is allowed to set up. A list of valid payment method types can be found [here](https://docs.stripe.com/api/payment_methods/object#payment_method_object-type).
    - name: single_use_mandate
      NAME: single_use_mandate
