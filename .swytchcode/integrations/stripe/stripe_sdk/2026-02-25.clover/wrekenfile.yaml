      NAME: fingerprint
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Uniquely identifies this particular bank account. You can use this attribute to check whether two bank accounts are the same.
    - name: future_requirements
      NAME: future_requirements
      type: ANY
      TYPE: ANY
      REQUIRED: false
      comment: Information about the [upcoming new requirements for the bank account](https://docs.stripe.com/connect/custom-accounts/future-requirements), including what information needs to be collected, and by when.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Unique identifier for the object.
    - name: last4
      NAME: last4
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The last four digits of the bank account number.
