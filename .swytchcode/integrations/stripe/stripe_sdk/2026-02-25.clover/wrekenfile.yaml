    - name: automatic_tax
      NAME: automatic_tax
      type: STRUCT(automatic_tax)
      TYPE: STRUCT(automatic_tax)
      REQUIRED: true
    - name: automatically_finalizes_at
      NAME: automatically_finalizes_at
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The time when this invoice is currently scheduled to be automatically finalized. The field will be `null` if the invoice is not scheduled to finalize in the future. If the invoice is not in the draft state, this field will always be `null` - see `finalized_at` for the time when an already-finalized invoice was finalized.
    - name: billing_reason
      NAME: billing_reason
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |-
        Indicates the reason why the invoice was created.

        * `manual`: Unrelated to a subscription, for example, created via the invoice editor.
        * `subscription`: No longer in use. Applies to subscriptions from before May 2018 where no distinction was made between updates, cycles, and thresholds.
        * `subscription_create`: A new subscription was created.
        * `subscription_cycle`: A subscription advanced into a new period.
        * `subscription_threshold`: A subscription reached a billing threshold.
        * `subscription_update`: A subscription was updated.
        * `upcoming`: Reserved for upcoming invoices created through the Create Preview Invoice API or when an `invoice.upcoming` event is generated for an upcoming invoice on a subscription.
    - name: collection_method
      NAME: collection_method
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Either `charge_automatically`, or `send_invoice`. When charging automatically, Stripe will attempt to pay this invoice using the default source attached to the customer. When sending an invoice, Stripe will email this invoice to the customer with payment instructions.
    - name: confirmation_secret
      NAME: confirmation_secret
      type: ANY
      TYPE: ANY
      REQUIRED: false
      comment: The confirmation secret associated with this invoice. Currently, this contains the client_secret of the PaymentIntent that Stripe creates during invoice finalization.
    - name: created
      NAME: created
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Time at which the object was created. Measured in seconds since the Unix epoch.
    - name: currency
      NAME: currency
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
    - name: custom_fields
      NAME: custom_fields
      type: "[]STRUCT(invoice_setting_custom_field)"
      TYPE: "[]STRUCT(invoice_setting_custom_field)"
      REQUIRED: true
      comment: Custom fields displayed on the invoice.
    - name: customer
      NAME: customer
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The ID of the customer to bill.
    - name: customer_account
      NAME: customer_account
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The ID of the account representing the customer to bill.
    - name: customer_address
      NAME: customer_address
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The customer's address. Until the invoice is finalized, this field will equal `customer.address`. Once the invoice is finalized, this field will no longer be updated.
    - name: customer_email
      NAME: customer_email
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The customer's email. Until the invoice is finalized, this field will equal `customer.email`. Once the invoice is finalized, this field will no longer be updated.
    - name: customer_name
      NAME: customer_name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The customer's name. Until the invoice is finalized, this field will equal `customer.name`. Once the invoice is finalized, this field will no longer be updated.
    - name: customer_phone
      NAME: customer_phone
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The customer's phone number. Until the invoice is finalized, this field will equal `customer.phone`. Once the invoice is finalized, this field will no longer be updated.
    - name: customer_shipping
      NAME: customer_shipping
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The customer's shipping information. Until the invoice is finalized, this field will equal `customer.shipping`. Once the invoice is finalized, this field will no longer be updated.
    - name: customer_tax_exempt
      NAME: customer_tax_exempt
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The customer's tax exempt status. Until the invoice is finalized, this field will equal `customer.tax_exempt`. Once the invoice is finalized, this field will no longer be updated.
    - name: customer_tax_ids
      NAME: customer_tax_ids
      type: "[]STRUCT(invoices_resource_invoice_tax_id)"
      TYPE: "[]STRUCT(invoices_resource_invoice_tax_id)"
      REQUIRED: false
      comment: The customer's tax IDs. Until the invoice is finalized, this field will contain the same tax IDs as `customer.tax_ids`. Once the invoice is finalized, this field will no longer be updated.
    - name: default_payment_method
      NAME: default_payment_method
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the default payment method for the invoice. It must belong to the customer associated with the invoice. If not set, defaults to the subscription's default payment method, if any, or to the default payment method in the customer's invoice settings.
    - name: default_source
      NAME: default_source
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the default payment source for the invoice. It must belong to the customer associated with the invoice and be in a chargeable state. If not set, defaults to the subscription's default source, if any, or to the customer's default source.
    - name: default_tax_rates
      NAME: default_tax_rates
      type: "[]STRUCT(tax_rate)"
      TYPE: "[]STRUCT(tax_rate)"
      REQUIRED: true
      comment: The tax rates applied to this invoice, if any.
    - name: description
      NAME: description
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: An arbitrary string attached to the object. Often useful for displaying to users. Referenced as 'memo' in the Dashboard.
    - name: discounts
      NAME: discounts
      type: "[]ANY"
      TYPE: "[]ANY"
      REQUIRED: true
      comment: The discounts applied to the invoice. Line item discounts are applied before invoice discounts. Use `expand[]=discounts` to expand each discount.
    - name: due_date
      NAME: due_date
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The date on which payment for this invoice is due. This value will be `null` for invoices where `collection_method=charge_automatically`.
    - name: effective_at
      NAME: effective_at
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The date when this invoice is in effect. Same as `finalized_at` unless overwritten. When defined, this value replaces the system-generated 'Date of issue' printed on the invoice PDF and receipt.
    - name: ending_balance
      NAME: ending_balance
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Ending customer balance after the invoice is finalized. Invoices are finalized approximately an hour after successful webhook delivery or when payment collection is attempted for the invoice. If the invoice has not been finalized yet, this will be null.
    - name: footer
      NAME: footer
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Footer displayed on the invoice.
    - name: from_invoice
      NAME: from_invoice
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: Details of the invoice that was cloned. See the [revision documentation](https://docs.stripe.com/invoicing/invoice-revisions) for more details.
    - name: hosted_invoice_url
      NAME: hosted_invoice_url
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The URL for the hosted invoice page, which allows customers to view and pay an invoice. If the invoice has not been finalized yet, this will be null.
    - name: id
      NAME: id
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Unique identifier for the object. For preview invoices created using the [create preview](https://stripe.com/docs/api/invoices/create_preview) endpoint, this id will be prefixed with `upcoming_in`.
    - name: invoice_pdf
      NAME: invoice_pdf
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: The link to download the PDF for the invoice. If the invoice has not been finalized yet, this will be null.
    - name: issuer
      NAME: issuer
      type: STRUCT(connect_account_reference)
      TYPE: STRUCT(connect_account_reference)
      REQUIRED: true
    - name: last_finalization_error
      NAME: last_finalization_error
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The error encountered during the previous attempt to finalize the invoice. This field is cleared when the invoice is successfully finalized.
    - name: latest_revision
      NAME: latest_revision
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The ID of the most recent non-draft revision of this invoice
    - name: lines
      NAME: lines
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: true
      comment: "The individual line items that make up the invoice. `lines` is sorted as follows: (1) pending invoice items (including prorations) in reverse chronological order, (2) subscription items in reverse chronological order, and (3) invoice items added after invoice creation in chronological order."
    - name: livemode
      NAME: livemode
      type: BOOL
      TYPE: BOOL
      REQUIRED: true
      comment: If the object exists in live mode, the value is `true`. If the object exists in test mode, the value is `false`.
    - name: metadata
      NAME: metadata
      type: map[STRING]STRING
      TYPE: map[STRING]STRING
      REQUIRED: true
      comment: Set of [key-value pairs](https://docs.stripe.com/api/metadata) that you can attach to an object. This can be useful for storing additional information about the object in a structured format.
    - name: next_payment_attempt
      NAME: next_payment_attempt
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The time at which payment will next be attempted. This value will be `null` for invoices where `collection_method=send_invoice`.
    - name: number
      NAME: number
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: A unique, identifying string that appears on emails sent to the customer for this invoice. This starts with the customer's unique invoice_prefix if it is specified.
    - name: object
      NAME: object
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: String representing the object's type. Objects of the same type share the same value.
    - name: on_behalf_of
      NAME: on_behalf_of
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The account (if any) for which the funds of the invoice payment are intended. If set, the invoice will be presented with the branding and support information of the specified account. See the [Invoices with Connect](https://docs.stripe.com/billing/invoices/connect) documentation for details.
    - name: parent
      NAME: parent
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The parent that generated this invoice
    - name: payment_settings
      NAME: payment_settings
      type: STRUCT(invoices_payment_settings)
      TYPE: STRUCT(invoices_payment_settings)
      REQUIRED: true
    - name: payments
      NAME: payments
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
      comment: Payments for this invoice. Use [invoice payment](/api/invoice-payment) to get more details.
    - name: period_end
      NAME: period_end
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: End of the usage period during which invoice items were added to this invoice. This looks back one period for a subscription invoice. Use the [line item period](/api/invoices/line_item#invoice_line_item_object-period) to get the service period for each price.
    - name: period_start
      NAME: period_start
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Start of the usage period during which invoice items were added to this invoice. This looks back one period for a subscription invoice. Use the [line item period](/api/invoices/line_item#invoice_line_item_object-period) to get the service period for each price.
    - name: post_payment_credit_notes_amount
      NAME: post_payment_credit_notes_amount
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Total amount of all post-payment credit notes issued for this invoice.
    - name: pre_payment_credit_notes_amount
      NAME: pre_payment_credit_notes_amount
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Total amount of all pre-payment credit notes issued for this invoice.
    - name: receipt_number
      NAME: receipt_number
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: This is the transaction number that appears on email receipts sent for this invoice.
    - name: rendering
      NAME: rendering
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The rendering-related settings that control how the invoice is displayed on customer-facing surfaces such as PDF and Hosted Invoice Page.
    - name: shipping_cost
      NAME: shipping_cost
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: The details of the cost of shipping, including the ShippingRate applied on the invoice.
    - name: shipping_details
      NAME: shipping_details
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: Shipping details for the invoice. The Invoice PDF will use the `shipping_details` value if it is set, otherwise the PDF will render the shipping address from the customer.
    - name: starting_balance
      NAME: starting_balance
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Starting customer balance before the invoice is finalized. If the invoice has not been finalized yet, this will be the current customer balance. For revision invoices, this also includes any customer balance that was applied to the original invoice.
    - name: statement_descriptor
      NAME: statement_descriptor
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Extra information about an invoice for the customer's credit card statement.
    - name: status
      NAME: status
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The status of the invoice, one of `draft`, `open`, `paid`, `uncollectible`, or `void`. [Learn more](https://docs.stripe.com/billing/invoices/workflow#workflow-overview)
    - name: status_transitions
      NAME: status_transitions
      type: STRUCT(invoices_resource_status_transitions)
      TYPE: STRUCT(invoices_resource_status_transitions)
      REQUIRED: true
    - name: subscription
      NAME: subscription
      type: ANY
      TYPE: ANY
      REQUIRED: false
    - name: subtotal
      NAME: subtotal
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Total of all subscriptions, invoice items, and prorations on the invoice before any invoice level discount or exclusive tax is applied. Item discounts are already incorporated
    - name: subtotal_excluding_tax
      NAME: subtotal_excluding_tax
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The integer amount in cents (or local equivalent) representing the subtotal of the invoice before any invoice level discount or tax is applied. Item discounts are already incorporated
    - name: test_clock
      NAME: test_clock
      type: ANY
      TYPE: ANY
      REQUIRED: true
      comment: ID of the test clock this invoice belongs to.
    - name: threshold_reason
      NAME: threshold_reason
      type: STRUCT(invoice_threshold_reason)
      TYPE: STRUCT(invoice_threshold_reason)
      REQUIRED: false
    - name: total
      NAME: total
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Total after discounts and taxes.
    - name: total_discount_amounts
      NAME: total_discount_amounts
      type: "[]STRUCT(discounts_resource_discount_amount)"
      TYPE: "[]STRUCT(discounts_resource_discount_amount)"
      REQUIRED: true
      comment: The aggregate amounts calculated per discount across all line items.
    - name: total_excluding_tax
      NAME: total_excluding_tax
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: The integer amount in cents (or local equivalent) representing the total amount of the invoice including all discounts but excluding all tax.
    - name: total_pretax_credit_amounts
      NAME: total_pretax_credit_amounts
      type: "[]STRUCT(invoices_resource_pretax_credit_amount)"
      TYPE: "[]STRUCT(invoices_resource_pretax_credit_amount)"
      REQUIRED: true
      comment: "Contains pretax credit amounts (ex: discount, credit grants, etc) that apply to this invoice. This is a combined list of total_pretax_credit_amounts across all invoice line items."
    - name: total_taxes
