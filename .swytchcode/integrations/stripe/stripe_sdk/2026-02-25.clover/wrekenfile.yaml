  payment_intents.cancel.create:
    SUMMARY: Cancel a PaymentIntent
    DESC: |-
      <p>You can cancel a PaymentIntent object when it’s in one of these statuses: <code>requires_payment_method</code>, <code>requires_capture</code>, <code>requires_confirmation</code>, <code>requires_action</code> or, <a href="/docs/payments/intents">in rare cases</a>, <code>processing</code>. </p>

      <p>After it’s canceled, no additional charges are made by the PaymentIntent and any operations on the PaymentIntent fail with an error. For PaymentIntents with a <code>status</code> of <code>requires_capture</code>, the remaining <code>amount_capturable</code> is automatically refunded. </p>

      <p>You can directly cancel the PaymentIntent for a Checkout Session only when the PaymentIntent has a status of <code>requires_capture</code>. Otherwise, you must <a href="/docs/api/checkout/sessions/expire">expire the Checkout Session</a>.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/payment_intents/{intent}/cancel
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(payment_intent)
    INPUTS:
      - intent:
          TYPE: STRING
          LOCATION: path
      - cancellation_reason:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(payment_intent)
        RETURNVAR: payment_intents_cancel_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
        RETURNVAR: payment_intents_cancel_create_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: payment_intents.cancel.create
  payment_intents.capture.create:
    SUMMARY: Capture a PaymentIntent
    DESC: |-
      <p>Capture the funds of an existing uncaptured PaymentIntent when its status is <code>requires_capture</code>.</p>

      <p>Uncaptured PaymentIntents are cancelled a set number of days (7 by default) after their creation.</p>

      <p>Learn more about <a href="/docs/payments/capture-later">separate authorization and capture</a>.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/payment_intents/{intent}/capture
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(payment_intent)
    INPUTS:
      - intent:
          TYPE: STRING
          LOCATION: path
      - amount_details:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - amount_to_capture:
          TYPE: INT
          REQUIRED: false
          LOCATION: body
      - application_fee_amount:
          TYPE: INT
          REQUIRED: false
          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - final_capture:
          TYPE: BOOL
          REQUIRED: false
          LOCATION: body
      - hooks:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - metadata:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - payment_details:
          TYPE: ANY
          REQUIRED: false
          LOCATION: body
      - statement_descriptor:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - statement_descriptor_suffix:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - transfer_data:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
    RETURNS:
      - RETURNTYPE: STRUCT(payment_intent)
        RETURNVAR: payment_intents_capture_create
        STATUS: 200
      - RETURNTYPE: STRUCT(error)
