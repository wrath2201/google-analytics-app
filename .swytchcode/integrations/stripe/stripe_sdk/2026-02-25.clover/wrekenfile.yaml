      METHOD: POST
      ENDPOINT: /v1/identity/verification_sessions
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
      ACCEPT: application/json
      BODYTYPE: x-www-form-urlencoded
    EXECUTION:
      KIND: http
      MODE: async
    ASYNC:
      RETURNS: result
      RESULT:
        TYPE: STRUCT(identity.verification_session)
    INPUTS:
      - client_reference_id:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - expand:
          TYPE: "[]STRING"
          REQUIRED: false
          LOCATION: body
      - metadata:
          TYPE: map[STRING]STRING
          REQUIRED: false
          LOCATION: body
      - options:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - provided_details:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - related_customer:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - related_customer_account:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - related_person:
          TYPE: OBJECT
          REQUIRED: false
          LOCATION: body
      - return_url:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - type:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
      - verification_flow:
          TYPE: STRING
          REQUIRED: false
          LOCATION: body
    RETURNS:
