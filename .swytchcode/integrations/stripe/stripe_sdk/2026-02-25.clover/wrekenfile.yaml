    - name: status
      NAME: status
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Status of this PaymentIntent, one of `requires_payment_method`, `requires_confirmation`, `requires_action`, `processing`, `requires_capture`, `canceled`, or `succeeded`. Read more about each PaymentIntent [status](https://docs.stripe.com/payments/intents#intent-statuses).
    - name: transfer_data
