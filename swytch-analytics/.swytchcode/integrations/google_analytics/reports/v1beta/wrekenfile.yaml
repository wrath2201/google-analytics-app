        WHEN: Client error (HTTP 401)
      - TYPE: ANY
        STATUS: 403
        WHEN: Client error (HTTP 403)
    CANONICAL_ID: v1alpha.propertyquotassnapshot.get
STRUCTS:
  Dimension:
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |
        The API name of the dimension (e.g., `country`, `city`, `deviceCategory`,
        `eventName`, `sessionSource`).
  Metric:
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: |
        The API name of the metric (e.g., `activeUsers`, `sessions`,
        `engagementRate`, `conversions`, `totalRevenue`).
    - name: expression
      NAME: expression
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: A mathematical expression for a derived metric (e.g., `eventCount/sessions`).
  DateRange:
    - name: startDate
      NAME: startDate
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Inclusive start date in `YYYY-MM-DD` format, or relative values like `today`, `yesterday`, `NdaysAgo`.
    - name: endDate
      NAME: endDate
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: Inclusive end date in `YYYY-MM-DD` format, or relative values like `today`, `yesterday`, `NdaysAgo`.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Optional name for this date range; appears in the response as a dimension value.
  MinuteRange:
    - name: startMinutesAgo
      NAME: startMinutesAgo
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Inclusive start of the range in minutes ago. Max 29.
    - name: endMinutesAgo
      NAME: endMinutesAgo
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Inclusive end of the range in minutes ago. Min 0.
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Optional name for this minute range.
  FilterExpression:
    - name: andGroup
      NAME: andGroup
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
      comment: Each expression in the AND group must be true.
    - name: orGroup
      NAME: orGroup
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
      comment: At least one expression in the OR group must be true.
    - name: notExpression
      NAME: notExpression
      type: ANY
      TYPE: ANY
      REQUIRED: false
      comment: The filter expression is NOT true.
    - name: filter
      NAME: filter
      type: STRUCT(Filter)
      TYPE: STRUCT(Filter)
      REQUIRED: false
  Filter:
    - name: fieldName
      NAME: fieldName
      type: STRING
      TYPE: STRING
      REQUIRED: true
      comment: The dimension or metric API name to filter on.
    - name: stringFilter
      NAME: stringFilter
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
    - name: inListFilter
      NAME: inListFilter
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
    - name: numericFilter
      NAME: numericFilter
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
    - name: betweenFilter
      NAME: betweenFilter
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
  OrderBy:
    - name: dimensionOrderBy
      NAME: dimensionOrderBy
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
    - name: metricOrderBy
      NAME: metricOrderBy
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
    - name: pivotOrderBy
      NAME: pivotOrderBy
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
    - name: desc
      NAME: desc
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: If true, sorts descending; otherwise ascending.
  Pivot:
    - name: fieldNames
      NAME: fieldNames
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: true
      comment: Dimension API names to use as pivot columns.
    - name: limit
      NAME: limit
      type: INT
      TYPE: INT
      REQUIRED: true
      comment: Maximum number of unique values for this pivot (required).
    - name: orderBys
      NAME: orderBys
      type: "[]STRUCT(OrderBy)"
      TYPE: "[]STRUCT(OrderBy)"
      REQUIRED: false
    - name: metricAggregations
      NAME: metricAggregations
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
      comment: Aggregation types to include in this pivot.
    - name: offset
      NAME: offset
      type: INT
      TYPE: INT
      REQUIRED: false
  CohortSpec:
    - name: cohorts
      NAME: cohorts
      type: "[]ANY"
      TYPE: "[]ANY"
      REQUIRED: false
    - name: cohortsRange
      NAME: cohortsRange
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
    - name: cohortReportSettings
      NAME: cohortReportSettings
      type: OBJECT
      TYPE: OBJECT
      REQUIRED: false
  Comparison:
    - name: name
      NAME: name
      type: STRING
      TYPE: STRING
      REQUIRED: false
    - name: dimensionFilter
      NAME: dimensionFilter
      type: STRUCT(FilterExpression)
      TYPE: STRUCT(FilterExpression)
      REQUIRED: false
    - name: comparison
      NAME: comparison
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: Comparison API name from the metadata response.
    - name: dateRange
      NAME: dateRange
      type: STRUCT(DateRange)
      TYPE: STRUCT(DateRange)
      REQUIRED: false
  RunReportRequest:
    - name: dimensions
      NAME: dimensions
      type: "[]STRUCT(Dimension)"
      TYPE: "[]STRUCT(Dimension)"
      REQUIRED: false
      comment: Maximum 9 dimensions per request.
    - name: metrics
      NAME: metrics
      type: "[]STRUCT(Metric)"
      TYPE: "[]STRUCT(Metric)"
      REQUIRED: false
    - name: dateRanges
      NAME: dateRanges
      type: "[]STRUCT(DateRange)"
      TYPE: "[]STRUCT(DateRange)"
      REQUIRED: false
    - name: dimensionFilter
      NAME: dimensionFilter
      type: STRUCT(FilterExpression)
      TYPE: STRUCT(FilterExpression)
      REQUIRED: false
    - name: metricFilter
      NAME: metricFilter
      type: STRUCT(FilterExpression)
      TYPE: STRUCT(FilterExpression)
      REQUIRED: false
    - name: offset
      NAME: offset
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Row offset for pagination. Default 0.
    - name: limit
      NAME: limit
      type: INT
      TYPE: INT
      REQUIRED: false
      comment: Number of rows to return. Default 10,000; max 250,000.
    - name: metricAggregations
      NAME: metricAggregations
      type: "[]STRING"
      TYPE: "[]STRING"
      REQUIRED: false
    - name: orderBys
      NAME: orderBys
      type: "[]STRUCT(OrderBy)"
      TYPE: "[]STRUCT(OrderBy)"
      REQUIRED: false
    - name: currencyCode
      NAME: currencyCode
      type: STRING
      TYPE: STRING
      REQUIRED: false
      comment: ISO 4217 currency code (e.g., `USD`). Affects currency metrics.
    - name: cohortSpec
      NAME: cohortSpec
      type: STRUCT(CohortSpec)
      TYPE: STRUCT(CohortSpec)
      REQUIRED: false
    - name: keepEmptyRows
      NAME: keepEmptyRows
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: If true, rows with all-zero metrics are included.
    - name: returnPropertyQuota
      NAME: returnPropertyQuota
      type: BOOL
      TYPE: BOOL
      REQUIRED: false
      comment: If true, the response includes current quota state.
    - name: comparisons
      NAME: comparisons
      type: "[]STRUCT(Comparison)"
      TYPE: "[]STRUCT(Comparison)"
      REQUIRED: false
  RunReportResponse:
    - name: dimensionHeaders
      NAME: dimensionHeaders
      type: "[]STRUCT(DimensionHeader)"
      TYPE: "[]STRUCT(DimensionHeader)"
      REQUIRED: false
    - name: metricHeaders
      NAME: metricHeaders
      type: "[]STRUCT(MetricHeader)"
      TYPE: "[]STRUCT(MetricHeader)"
      REQUIRED: false
    - name: rows
      NAME: rows
      type: "[]STRUCT(Row)"
      TYPE: "[]STRUCT(Row)"
      REQUIRED: false
    - name: totals
      NAME: totals
      type: "[]STRUCT(Row)"
      TYPE: "[]STRUCT(Row)"
      REQUIRED: false
    - name: maximums
      NAME: maximums
      type: "[]STRUCT(Row)"
      TYPE: "[]STRUCT(Row)"
      REQUIRED: false
    - name: minimums
      NAME: minimums
      type: "[]STRUCT(Row)"
      TYPE: "[]STRUCT(Row)"
      REQUIRED: false
    - name: rowCount
      NAME: rowCount
