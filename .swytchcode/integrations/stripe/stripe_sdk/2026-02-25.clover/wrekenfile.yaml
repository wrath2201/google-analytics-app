      - RETURNTYPE: STRUCT(error)
        RETURNVAR: accounts_external_account_get_8381_NaN
        STATUS: .nan
    ERRORS:
      - TYPE: STRUCT(error)
        STATUS: 500
        WHEN: Error response. (HTTP default)
    CANONICAL_ID: accounts.external_account.get_8381
  accounts.external_account.create_ae6f:
    SUMMARY: |-
      <p>Updates the metadata, account holder name, account holder type of a bank account belonging to
      a connected account and optionally sets it as the default for its currency
    DESC: |-
      <p>Updates the metadata, account holder name, account holder type of a bank account belonging to
      a connected account and optionally sets it as the default for its currency. Other bank account
      details are not editable by design.</p>

      <p>You can only update bank accounts when <a href="/api/accounts/object#account_object-controller-requirement_collection">account.controller.requirement_collection</a> is <code>application</code>, which includes <a href="/connect/custom-accounts">Custom accounts</a>.</p>

      <p>You can re-enable a disabled bank account by performing an update call without providing any
      arguments or changes.</p>
    HTTP:
      METHOD: POST
      ENDPOINT: /v1/accounts/{account}/external_accounts/{id}
      HEADERS:
        Content-Type: application/x-www-form-urlencoded
        Authorization: bearer_token
      CONTENT_TYPE: application/x-www-form-urlencoded
